# Dependabot keeps the tag-pinned GitHub Actions in .github/workflows up to
# date, opening one weekly pull request that bumps every action. cargo
# dependencies are intentionally not tracked here: security advisories are
# covered by the scheduled cargo audit (.github/workflows/audit.yml), and
# routine crate bumps are reviewed manually to avoid a churn of per-crate
# PRs. Only the github-actions ecosystem is configured.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Batch all action bumps into a single PR instead of one per action.
    groups:
      github-actions:
        patterns:
          - "*"
    # Match the repository's conventional-commit style (e.g. `ci: ...`).
    commit-message:
      prefix: "ci"
    # dtolnay/rust-toolchain refs select a Rust toolchain, not an action
    # version: `@stable` is a rolling ref and `@1.85.0` is the intentional MSRV
    # pin. Dependabot must not "bump" either (bumping the pin to a nonexistent
    # Rust release breaks the MSRV job on a 404).
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
