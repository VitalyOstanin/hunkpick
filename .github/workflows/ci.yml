name: CI

on: [push, pull_request]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Docs
        run: cargo doc --no-deps

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Pinned LTS runners, not `ubuntu-latest` (it trails the newest LTS by
        # months). ubuntu-26.04 is the current Ubuntu LTS (preview runner image
        # as of 2026-06); ubuntu-24.04 stays for stable coverage. Drop 24.04 and
        # bump 26.04 when a newer LTS ships.
        os: [ubuntu-24.04, ubuntu-26.04, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      # Prebuilt nextest binary (no compile, no Rust-version bump): the
      # .config/nextest.toml profile enforces a per-test timeout and bounded
      # parallelism that `cargo test` cannot express.
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-nextest
      - name: Run tests
        run: cargo nextest run --all-features
      # nextest does not run doctests; keep them covered explicitly.
      - name: Run doctests
        run: cargo test --all-features --doc

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@8641a17e25bf5b40c118d48fe0f81e8655731839 # 1.85.0
      - name: Build
        run: cargo build

  # The security audit lives in its own workflow (.github/workflows/audit.yml)
  # so it can also run on a weekly schedule — a cron run catches advisories
  # published against unchanged dependencies, which a push-only audit misses.
