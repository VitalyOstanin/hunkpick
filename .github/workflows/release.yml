name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Must already exist on the repository.'
        required: true
        type: string
      dry_run:
        description: 'If true, skip the final cargo publish and the GitHub Release/asset steps.'
        required: false
        type: boolean
        default: false

# Default to least-privilege: only the jobs that write to the repo
# (`gh release create` / `gh release upload`) request `contents: write`.
permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the CI gates on the tagged commit. release.yml is triggered by a
  # tag push, not a branch push, so CI's success on master is not
  # authoritative here. Publication is gated on `needs: [test, lint, msrv]`
  # below; any failing pre-publish job aborts cargo publish before it can
  # ship a broken release.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Pinned LTS runners, not `ubuntu-latest` (it trails the newest LTS
        # by months). ubuntu-26.04 is the current Ubuntu LTS (preview runner
        # image as of 2026-06); ubuntu-24.04 stays for stable coverage.
        # windows + macos round out the published-binary platforms.
        os: [ubuntu-24.04, ubuntu-26.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry
      - name: cargo build
        run: cargo build --verbose
      - name: cargo test
        run: cargo test --all-features --verbose

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  msrv:
    name: MSRV build (1.85.0)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry
      - name: cargo build --locked
        run: cargo build --locked --verbose

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [test, lint, msrv]
    # The only jobs that need to write to the repo: `gh release create`
    # requires `contents: write`.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: Resolve tag and version
        # Single source of truth for "what are we releasing". Both push and
        # workflow_dispatch end here; later steps read steps.tag.outputs.tag
        # (with `v` prefix, e.g. `v0.1.0`) and steps.tag.outputs.version
        # (without prefix, e.g. `0.1.0`) instead of re-deriving them.
        #
        # The workflow_dispatch input is passed through `env:` rather than
        # interpolated into the shell body so a malicious tag value cannot
        # smuggle commands at template-expansion time.
        # `release-validate-tag.sh` then enforces the `vX.Y.Z[-pre+build]`
        # format on the resolved tag regardless of which trigger produced it.
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          bash scripts/release-validate-tag.sh "$TAG"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Cargo.toml and Cargo.lock versions
        env:
          TAG_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # cargo pkgid emits e.g. `path+file:///work/repo#0.1.0` or
          # `...#hunkpick@0.1.0`. Strip everything up to the last `#`/`@` to
          # get the resolved package version straight from Cargo's parser,
          # instead of an ad-hoc pattern that could match a `version = "..."`
          # line in a [dependencies.*] block.
          CARGO_VERSION=$(cargo pkgid | sed -E 's/.*[#@]//')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          # Cargo.lock holds the resolved version of the crate itself. If the
          # author forgot to refresh the lock after bumping Cargo.toml, the
          # tag would ship with a stale lock; `--locked` would later catch it
          # with a confusing "package not found". Fail loudly here instead.
          LOCK_VERSION=$(awk '/^name = "hunkpick"$/{getline; sub(/^version = "/, ""); sub(/"$/, ""); print; exit}' Cargo.lock)
          if [ "$LOCK_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.lock version $LOCK_VERSION does not match tag v$TAG_VERSION. Run \`cargo update -p hunkpick\` and commit Cargo.lock."
            exit 1
          fi

      - name: Verify CHANGELOG has the version section
        run: ./scripts/check-changelog.sh "${{ steps.tag.outputs.version }}"

      - name: Release smoke test
        # Run on the LTO-enabled release profile to catch optimizer-only bugs
        # (UB exposed by inlining, dead-code elimination collapsing a side
        # effect) that the debug-profile tests cannot see. The exit code is
        # the signal of interest, not the output content.
        run: |
          cargo build --release --locked
          ./target/release/hunkpick --version
          ./target/release/hunkpick --help >/dev/null
          printf '%s\n' \
            'diff --git a/f b/f' '--- a/f' '+++ b/f' \
            '@@ -1 +1 @@' '-old' '+new' \
            | ./target/release/hunkpick list >/dev/null

      - name: cargo package --list
        run: cargo package --list

      - name: cargo publish --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # --locked forbids Cargo from regenerating Cargo.lock; the published
        # version is whatever was committed at the tagged commit. Pairs with
        # the lock-version check above so a stale lock cannot reach crates.io.
        run: cargo publish --dry-run --locked

      - name: cargo publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      - name: Extract release notes from CHANGELOG.md
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          VER: ${{ steps.tag.outputs.version }}
        run: |
          awk -v ver="$VER" '
            $0 ~ "^## \\["ver"\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md | sed -e '1{/^$/d}' -e '$,${/^$/d}' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG.md entry found for $VER; falling back to a placeholder note."
            echo "_See git history._" > release-notes.md
          fi

      - name: Create GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping create."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag

  # Cross-platform prebuilt assets. Runs after `publish` so the GitHub
  # Release already exists and `gh release upload` can attach to it.
  package-binaries:
    name: Package (${{ matrix.target }})
    needs: [publish]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # One tier-1 target per OS. The Linux row stays on the older LTS
        # (ubuntu-24.04) on purpose: linking against its older glibc yields a
        # binary that also runs on newer distributions, whereas building on
        # 26.04 would require a newer glibc at runtime. macos-latest is Apple
        # Silicon; x86_64-apple-darwin is a cross-compile needing only
        # `rustup target add`.
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: hunkpick
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: hunkpick
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: hunkpick
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: hunkpick.exe
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install GNU tar on macOS
        # scripts/package-archive.sh uses GNU-tar flags (--sort, --owner,
        # --group, --numeric-owner, --mtime) for reproducible archives. The
        # script prefers `gtar`; `gnu-tar` provides it on Homebrew so macOS
        # produces the same byte-for-byte layout as Linux.
        if: runner.os == 'macOS'
        run: brew install gnu-tar
      - uses: Swatinem/rust-cache@v2
        with:
          # Per-target cache key so the matrix entries do not stomp each
          # other's target/ directory.
          key: ${{ matrix.target }}
      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: Resolve tag and version
        # Mirrors the publish job's resolve step: `inputs.tag` flows through
        # `env:` (no YAML expansion into the shell), then
        # `release-validate-tag.sh` enforces the format before any later step
        # consumes the value.
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          bash scripts/release-validate-tag.sh "$TAG"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Packaging is delegated to scripts/package-archive.sh so the same
      # logic can be exercised locally. `tar` is available on every runner;
      # `7z` is preinstalled on windows-latest and is the most stable
      # cross-shell way to produce a .zip without PowerShell CRLF gotchas.
      - name: Package archive and SHA-256
        id: pack
        shell: bash
        env:
          VER: ${{ steps.tag.outputs.version }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive }}
          BIN_NAME: ${{ matrix.binary }}
          BIN_PATH: target/${{ matrix.target }}/release/${{ matrix.binary }}
        run: bash scripts/package-archive.sh >> "$GITHUB_OUTPUT"

      # Defends the archive contract: filename matches the template, sibling
      # .sha256 verifies cleanly, archive expands to a single top-level
      # directory matching the stem containing exactly binary + README +
      # LICENSE. Catches layout regressions before the asset reaches users.
      - name: Verify archive against downstream contract
        shell: bash
        env:
          ASSET: ${{ steps.pack.outputs.asset }}
          BIN_NAME: ${{ matrix.binary }}
        run: bash scripts/verify-archive.sh "$ASSET" "$BIN_NAME"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          ASSET: ${{ steps.pack.outputs.asset }}
        shell: bash
        run: |
          # `--clobber` makes the upload idempotent: a re-run after a
          # transient failure overwrites the partial blob instead of erroring
          # with "asset already exists".
          gh release upload "$TAG" "$ASSET" "${ASSET}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
